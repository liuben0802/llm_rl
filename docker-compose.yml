version: "3.8"

# 宿主机路径 → 容器挂载点：
#   /data4/mirror/Qwen        → /models    只读，模型权重
#   /data4/datas              → /data      读写，训练数据（含 teacher_responses.jsonl）
#   /data4/mirror/model/saves → /saves     读写，checkpoint 输出
#   ./workspace               → /workspace 读写，configs / src / logs

x-gpu-0123: &gpu-0123
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            device_ids: ["0", "1", "2", "3"]
            capabilities: [gpu]

x-volumes: &volumes
  - type: bind
    source: /data4/mirror/Qwen
    target: /models
    read_only: true
  - type: bind
    source: /data4/datas
    target: /data
  - type: bind
    source: /data4/mirror/model/saves
    target: /saves
  - type: bind
    source: ./workspace
    target: /workspace

x-env: &env
    CUDA_VISIBLE_DEVICES: "0,1,2,3"
    NCCL_DEBUG: "WARN"
    NCCL_IB_DISABLE: "1"
    CUDA_DEVICE_MAX_CONNECTIONS: "1"
    PYTHONPATH: "/workspace"
    TRANSFORMERS_OFFLINE: "1"
    HF_DATASETS_OFFLINE: "1"

services:

  llamafactory:
    image: ${LLAMAFACTORY_IMAGE}
    container_name: rec_llamafactory
    restart: "no"
    <<: *gpu-0123
    volumes: *volumes
    environment:
      <<: *env
      RAY_ADDRESS: local
    working_dir: /workspace
    command: tail -f /dev/null
    shm_size: "16gb"
    ulimits:
      memlock: -1
      stack: 67108864
    ipc: host

  verl:
    image: ${VERL_IMAGE}
    container_name: rec_verl
    restart: "no"
    <<: *gpu-0123
    volumes: *volumes
    environment:
      <<: *env
      RAY_ADDRESS: local
      NCCL_P2P_DISABLE: "0"
    working_dir: /workspace
    command: tail -f /dev/null
    shm_size: "32gb"
    ulimits:
      memlock: -1
      stack: 67108864
    ipc: host
    pid: host
