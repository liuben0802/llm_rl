### configs/rm_lf.yaml
### LLaMA-Factory Reward Model 训练配置 —— 4× A100 80GB
### base 模型 = SFT checkpoint（继承任务对齐知识，收敛更快）
###
### 运行命令：
###   accelerate launch \
###     --config_file configs/fsdp2_4gpu.yaml \
###     $(which llamafactory-cli) train configs/rm_lf.yaml

# ── 模型（从 SFT checkpoint 加载）──
model_name_or_path: checkpoints/sft   # LoRA adapter 目录
# LLaMA-Factory 会自动识别 adapter_config.json，加载 base+adapter
trust_remote_code: true

# ── 任务 ──
stage: rm                  # Reward Model 训练（Bradley-Terry loss，LF 内置）
do_train: true
finetuning_type: lora      # 在 SFT adapter 基础上继续 LoRA

# ── LoRA ──
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target: q_proj,k_proj,v_proj,o_proj,gate_proj,up_proj,down_proj
lora_bias: none
create_new_adapter: true   # 重新初始化 adapter，不继承 SFT adapter 权重

# ── 数据集（pairwise ranking 格式）──
dataset: rec_rm
dataset_dir: data
template: qwen3
cutoff_len: 6144
overwrite_cache: true
preprocessing_num_workers: 8

# ── 输出 ──
output_dir: checkpoints/rm
logging_dir: logs/rm
overwrite_output_dir: true

# ── 训练超参 ──
num_train_epochs: 3
per_device_train_batch_size: 1     # RM 同时前向 chosen+rejected，显存翻倍，batch=1
gradient_accumulation_steps: 8    # 等效 batch = 1×4GPU×8 = 32
learning_rate: 1.0e-4
lr_scheduler_type: cosine
warmup_ratio: 0.1
weight_decay: 0.01
max_grad_norm: 1.0

# ── 精度 & 效率 ──
bf16: true
flash_attn: fa2
gradient_checkpointing: true
# RM 训练不需要 packing（chosen/rejected 必须配对）

# ── RM 专属 ──
# LLaMA-Factory stage=rm 内置 Bradley-Terry ranking loss
# center_rewards: true 会对 reward 做 batch 内均值归一化，增强稳定性

# ── 日志 & 保存 ──
logging_steps: 10
save_steps: 100
save_total_limit: 2
plot_loss: true
report_to: tensorboard

dataloader_num_workers: 4
dataloader_pin_memory: true
