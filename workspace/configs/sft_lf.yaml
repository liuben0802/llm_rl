### workspace/configs/sft_lf.yaml
### LLaMA-Factory SFT 训练配置
### 全链路使用完整 prompt，无截断
###
### token 估算：
###   system(~1940) + user(~2500) + response(~2850) ≈ 7290 token
###   max_seq_length=8192 足够，无需压缩

model_name_or_path: /models/Qwen3-14B
trust_remote_code: true

stage: sft
do_train: true
finetuning_type: lora

lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target: q_proj,k_proj,v_proj,o_proj,gate_proj,up_proj,down_proj

dataset: rec_sft
dataset_dir: /data
template: qwen3
# 完整 prompt 约 7290 token，设 8192 留余量
cutoff_len: 8192
overwrite_cache: true
preprocessing_num_workers: 8

output_dir: /saves/sft
logging_dir: /workspace/logs/sft
overwrite_output_dir: true

num_train_epochs: 1
per_device_train_batch_size: 1     # 序列变长，batch 从 2 降到 1
gradient_accumulation_steps: 8    # 等效 batch = 1×4GPU×8 = 32
learning_rate: 2.0e-5
lr_scheduler_type: cosine
warmup_ratio: 0.05
weight_decay: 0.01
max_grad_norm: 1.0

bf16: true
flash_attn: fa2
gradient_checkpointing: true
packing: true
neat_packing: true

logging_steps: 10
save_steps: 200
save_total_limit: 2
plot_loss: true
report_to: tensorboard

dataloader_num_workers: 4
dataloader_pin_memory: true
ddp_timeout: 180000
