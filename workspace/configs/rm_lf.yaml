### workspace/configs/rm_lf.yaml
### LLaMA-Factory Reward Model 训练配置
###
### 显存估算（Qwen3-14B + LoRA r=16，batch=1 chosen+rejected pair，A100 80GB）：
###   冻结模型 28GB + LoRA优化器 1.8GB + 激活值(2序列)~15GB ≈ 45GB/卡
###   DDP 单卡 45GB << 80GB，无需 FSDP
###
### 运行命令：
###   FORCE_TORCHRUN=1 NPROC_PER_NODE=4 llamafactory-cli train /workspace/configs/rm_lf.yaml

model_name_or_path: /saves/sft
trust_remote_code: true

stage: rm
do_train: true
finetuning_type: lora

lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target: q_proj,k_proj,v_proj,o_proj,gate_proj,up_proj,down_proj
lora_bias: none
create_new_adapter: true

dataset: rec_rm
dataset_dir: /data
template: qwen3
cutoff_len: 8192
overwrite_cache: true
preprocessing_num_workers: 8

output_dir: /saves/rm
logging_dir: /workspace/logs/rm
overwrite_output_dir: true

num_train_epochs: 3
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 1.0e-4
lr_scheduler_type: cosine
warmup_ratio: 0.1
weight_decay: 0.01
max_grad_norm: 1.0

bf16: true
flash_attn: fa2
gradient_checkpointing: true

logging_steps: 10
save_steps: 100
save_total_limit: 2
plot_loss: true
report_to: tensorboard

dataloader_num_workers: 4
dataloader_pin_memory: true
