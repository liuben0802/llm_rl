### workspace/configs/sft_lf.yaml
### LLaMA-Factory SFT 训练配置

# 模型：从 /models（← 宿主机 /data4/mirror/Qwen）加载
model_name_or_path: /models/Qwen3-14B
trust_remote_code: true

stage: sft
do_train: true
finetuning_type: lora

lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target: q_proj,k_proj,v_proj,o_proj,gate_proj,up_proj,down_proj
lora_bias: none

# 数据：从 /data（← 宿主机 /data4/datas）加载
dataset: rec_sft
dataset_dir: /data
template: qwen3
cutoff_len: 6144
overwrite_cache: true
preprocessing_num_workers: 8

# 输出：写入 /saves（← 宿主机 /data4/mirror/model/saves）
output_dir: /saves/sft
logging_dir: /workspace/logs/sft
overwrite_output_dir: true

num_train_epochs: 1
per_device_train_batch_size: 2
gradient_accumulation_steps: 4
learning_rate: 2.0e-5
lr_scheduler_type: cosine
warmup_ratio: 0.05
weight_decay: 0.01
max_grad_norm: 1.0

bf16: true
flash_attn: fa2
gradient_checkpointing: true
packing: true
neat_packing: true

logging_steps: 10
save_steps: 200
save_total_limit: 2
plot_loss: true
report_to: tensorboard

dataloader_num_workers: 4
dataloader_pin_memory: true
ddp_timeout: 180000
